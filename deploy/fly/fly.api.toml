app = "genomni-api"
primary_region = "mad"

[build]
  dockerfile = "../../backend/Dockerfile.fly"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  CACHE_STORE = "redis"
  SESSION_DRIVER = "redis"
  SESSION_CONNECTION = "default"
  SESSION_STORE = "redis"
  QUEUE_CONNECTION = "redis"
  REDIS_CLIENT = "phpredis"
  REDIS_PORT = "6379"
  REDIS_DB = "0"
  REDIS_CACHE_DB = "1"
  REDIS_QUEUE_CONNECTION = "default"
  REDIS_QUEUE = "default"

[processes]
  app = "php artisan serve --host=0.0.0.0 --port=8080"
  worker = "php artisan queue:work redis --sleep=1 --tries=3 --timeout=120"

[deploy]
  release_command = "php artisan migrate --force"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/up"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
