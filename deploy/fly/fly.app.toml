app = "genomni-app"
primary_region = "mad"

[build]
  dockerfile = "../../frontend/Dockerfile.fly"

  [build.args]
    VITE_API_BASE_URL = "https://genomni-api.fly.dev/api"
    VITE_APP_HOST = "genomni-app.fly.dev"
    VITE_ADMIN_HOST = "genomni-admin.fly.dev"
    VITE_FORCE_CONTEXT = "app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
