services:
  # BACKEND (Laravel)
  - type: web
    name: lavasys-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    plan: starter
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: SESSION_CONNECTION
        value: default
      - key: SESSION_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: lavasys-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: lavasys-redis
          property: port
      - key: REDIS_QUEUE_CONNECTION
        value: default
      - key: REDIS_QUEUE
        value: default
      - key: FRONTEND_URL
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: ADMIN_FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false

  # WORKER (SEM startCommand ❗)
  - type: worker
    name: lavasys-queue
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.render
    dockerCommand: php artisan queue:work redis --sleep=1 --tries=3 --timeout=120
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: SESSION_CONNECTION
        value: default
      - key: SESSION_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: lavasys-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: lavasys-redis
          property: port
      - key: REDIS_QUEUE_CONNECTION
        value: default
      - key: REDIS_QUEUE
        value: default

  # REDIS (corrigido)
  - type: keyvalue
    name: lavasys-redis
    plan: starter
    ipAllowList: []   # 🔥 permite acesso interno
    maxmemoryPolicy: allkeys-lru

  # FRONTEND CLIENTE (app.genomni.com)
  - type: web
    name: genomni-app
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_HOST
        value: app.genomni.com
      - key: VITE_ADMIN_HOST
        value: admin.genomni.com
      - key: VITE_FORCE_CONTEXT
        value: app

  # FRONTEND ADMIN (admin.genomni.com)
  - type: web
    name: genomni-admin
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_APP_HOST
        value: app.genomni.com
      - key: VITE_ADMIN_HOST
        value: admin.genomni.com
      - key: VITE_FORCE_CONTEXT
        value: admin
